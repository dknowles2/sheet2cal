<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!-- Background -->
  <rect width="96" height="96" rx="16" fill="#1a73e8"/>

  <!-- Calendar body -->
  <rect x="18" y="28" width="60" height="52" rx="5" fill="white"/>

  <!-- Calendar header bar -->
  <rect x="18" y="28" width="60" height="18" rx="5" fill="#1557b0"/>
  <rect x="18" y="37" width="60" height="9" fill="#1557b0"/>

  <!-- Binding rings -->
  <rect x="31" y="21" width="6" height="14" rx="3" fill="white"/>
  <rect x="59" y="21" width="6" height="14" rx="3" fill="white"/>

  <!-- Grid lines (columns) -->
  <line x1="38" y1="46" x2="38" y2="76" stroke="#dadce0" stroke-width="1.5"/>
  <line x1="58" y1="46" x2="58" y2="76" stroke="#dadce0" stroke-width="1.5"/>

  <!-- Grid lines (rows) -->
  <line x1="18" y1="56" x2="78" y2="56" stroke="#dadce0" stroke-width="1.5"/>
  <line x1="18" y1="66" x2="78" y2="66" stroke="#dadce0" stroke-width="1.5"/>

  <!-- Spreadsheet cells filled in (green tint) -->
  <rect x="19" y="47" width="18" height="8"  rx="1" fill="#e6f4ea" opacity="0.9"/>
  <rect x="39" y="47" width="18" height="8"  rx="1" fill="#e6f4ea" opacity="0.9"/>
  <rect x="19" y="57" width="18" height="8"  rx="1" fill="#e6f4ea" opacity="0.9"/>
  <rect x="59" y="67" width="18" height="8"  rx="1" fill="#e6f4ea" opacity="0.9"/>

  <!-- Sync arrow -->
  <path d="M 62 50 A 9 9 0 1 1 71 59" stroke="#1a73e8" stroke-width="3" fill="none" stroke-linecap="round"/>
  <polygon points="71,54 71,64 64,59" fill="#1a73e8"/>
</svg>
